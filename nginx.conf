# Main NGINX configuration file

# Worker settings (can leave as default)
worker_processes  1;

events {
    worker_connections  1024;
}

# HTTP section – server blocks must be here
http {

    # Your gateway / reverse proxy server
    server {
        listen 8080;

        location /courses {
            proxy_pass http://localhost:4000/courses;
        }

        location /users {
            proxy_pass http://localhost:4000/users;
        }
    }

}